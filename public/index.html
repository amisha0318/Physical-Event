<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueCrowd | Smart Event Optimizer</title>
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="Revolutionizing event experiences with real-time crowd management and navigation.">
    <meta name="keywords" content="smart venue, event optimization, crowd density, navigation, stadium management">

    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #22d3ee;
            --bg-dark: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Panels */
        .sidebar {
            background: var(--bg-dark);
            border-right: 1px solid var(--glass);
            overflow-y: auto;
            padding: 1.5rem;
        }

        .panel {
            background: var(--surface);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass);
            backdrop-filter: blur(5px);
        }

        .panel-title {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--glass);
            padding-bottom: 0.5rem;
        }

        /* Crowd Zones */
        .zone-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .zone-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .density-tag {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .low { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .high { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* Map Container */
        #map {
            width: 100%;
            height: 100%;
        }

        /* Controls Panel (Top Floating) */
        .floating-controls {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            filter: brightness(1.2);
        }

        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--glass);
        }

        .btn-calendar {
            background: #4285F4;
            margin-top: 10px;
        }

        /* Form Controls */
        select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--glass);
            padding: 0.5rem;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 0.5rem;
            outline: none;
        }

        /* Dynamic Route Banner */
        #route-banner {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--primary);
        }

        #route-banner.active {
            max-height: 200px;
            padding: 1rem;
            margin-top: 1rem;
        }

        /* Notifications Overlay */
        #notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
            width: 350px;
        }

        #notification.show { transform: translateX(0); }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar { position: absolute; bottom: 0; width: 100%; height: 300px; z-index: 20; border-top: 1px solid var(--glass); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">VenueCrowd <span>v1.0</span></div>
        <div id="connection-status"><span class="loader"></span> Connecting...</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="panel">
                <h3 class="panel-title">Real-time Density</h3>
                <div id="crowd-list">
                    <!-- Dynamic Loading -->
                    <p style="color: var(--text-muted)">Fetching status...</p>
                </div>
            </div>

            <div class="panel">
                <h3 class="panel-title">Event Schedule</h3>
                <div style="font-size: 0.9rem;">
                    <strong>Grand Final 2026</strong><br>
                    <span style="color: var(--text-muted)">May 10, 18:00 UTC</span>
                </div>
                <button class="btn btn-calendar" style="width: 100%" onclick="syncCalendar()">
                    📅 Add to Google Calendar
                </button>
            </div>

            <div class="panel">
                <h3 class="panel-title">Smart Routing</h3>
                <select id="start-node">
                    <option value="gate_a">Main Gate A</option>
                    <option value="gate_b">North Gate B</option>
                </select>
                <select id="end-node">
                    <option value="seating_zone_1">Lower Tier Seating</option>
                </select>
                <button class="btn" style="width: 100%" onclick="getSmartRoute()">Find Best Route</button>

                <div id="route-banner">
                    <strong style="color: var(--secondary)">Optimized Route Found!</strong>
                    <p id="route-instructions" style="font-size: 0.8rem; margin-top: 5px;"></p>
                </div>
            </div>

            <div class="panel">
                <h3 class="panel-title">Queue Estimates</h3>
                <div id="queue-list"></div>
            </div>
        </div>

        <div style="position: relative;">
            <div id="map"></div>
            <div class="floating-controls">
                <button class="btn btn-secondary" onclick="simulateAlert()">Test Alert Flow</button>
                <button class="btn" onclick="openAdmin()">Admin Simulation</button>
            </div>
        </div>
    </div>

    <!-- Push Notification Overlay -->
    <div id="notification">
        <h4 id="notif-title">Alert</h4>
        <p id="notif-msg" style="color: var(--text-muted); font-size: 0.9rem;"></p>
    </div>

    <!-- Google Maps API (Placeholder for USER key) -->
    <script>
        // Use placeholder value, will be replaced by user or via .env in production
        const GOOGLE_API_KEY = "REPLACE_WITH_YOUR_KEY"; 
        
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_API_KEY}&callback=initMap`;
        script.async = true;
        document.head.appendChild(script);

        let map, markers = [];

        function initMap() {
            // Center on a stadium location (example: Melbourne Cricket Ground)
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -37.8198, lng: 144.9834 },
                zoom: 17,
                styles: [
                  { "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
                  { "elementType": "labels.text.fill", "stylers": [{ "color": "#94a3b8" }] },
                  { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#334155" }] }
                ]
            });
            fetchData();
        }

        async function fetchData() {
            try {
                const response = await fetch('/crowd');
                const data = await response.json();
                updateUI(data);
                document.getElementById('connection-status').innerHTML = "🟢 Live - Tracking 6 Areas";
            } catch (e) {
                console.error("Fetch failed", e);
                document.getElementById('connection-status').innerHTML = "🔴 Connection Lost";
            }
        }

        function updateUI(zones) {
            const list = document.getElementById('crowd-list');
            list.innerHTML = '';
            
            // Clear markers
            markers.forEach(m => m.setMap(null));
            markers = [];

            zones.forEach(zone => {
                const card = document.createElement('div');
                card.className = 'zone-card';
                const statusClass = zone.status.toLowerCase();
                card.innerHTML = `
                    <span class="zone-name">${zone.name}</span>
                    <span class="density-tag ${statusClass}">${zone.status}</span>
                `;
                list.appendChild(card);

                // Add to map (if initialized)
                if (map) {
                    const marker = new google.maps.Marker({
                        position: { lat: -37.8198 + (Math.random() * 0.005 - 0.0025), lng: 144.9834 + (Math.random() * 0.01 - 0.005) },
                        map: map,
                        title: zone.name,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: zone.density / 4,
                            fillColor: zone.status === 'High' ? "#ef4444" : (zone.status === 'Medium' ? "#f59e0b" : "#10b981"),
                            fillOpacity: 0.6,
                            strokeWeight: 1,
                            strokeColor: "#fff"
                        }
                    });
                    markers.push(marker);
                }
            });
        }

        async function syncCalendar() {
            try {
                const btn = document.querySelector('.btn-calendar');
                btn.innerHTML = '<span class="loader"></span> Syncing...';
                btn.disabled = true;

                const res = await fetch('/calendar/sync', { method: 'POST' });
                const data = await res.json();
                
                const notif = document.getElementById('notification');
                document.getElementById('notif-title').innerText = data.success ? "📅 Calendar Updated" : "⚠️ Sync Notice";
                document.getElementById('notif-msg').innerText = data.success ? "Event added to your Google Calendar!" : (data.details || "Integration in draft mode.");
                
                notif.classList.add('show');
                setTimeout(() => notif.classList.remove('show'), 5000);
                
                if (data.link) {
                    if (confirm("Event synced! Open in Google Calendar?")) window.open(data.link, '_blank');
                }
            } catch (e) {
                alert("Failed to connect to sync service.");
            } finally {
                const btn = document.querySelector('.btn-calendar');
                btn.innerHTML = '📅 Add to Google Calendar';
                btn.disabled = false;
            }
        }

        async function getSmartRoute() {
            const from = document.getElementById('start-node').value;
            const to = document.getElementById('end-node').value;
            
            const res = await fetch(`/route?from=${from}&to=${to}`);
            const data = await res.json();
            
            const banner = document.getElementById('route-banner');
            const instructions = document.getElementById('route-instructions');
            
            instructions.innerHTML = `Take <strong>${data.suggestion.path.join(' → ')}</strong>. <br>Benefit: ${data.benefit}`;
            banner.classList.add('active');
            
            setTimeout(() => banner.classList.remove('active'), 8000);
        }

        async function simulateAlert() {
            const res = await fetch('/alert');
            const data = await res.json();
            
            const notif = document.getElementById('notification');
            document.getElementById('notif-title').innerText = data.alert.title;
            document.getElementById('notif-msg').innerText = data.alert.message;
            
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 5000);
        }

        function openAdmin() {
            const pass = prompt("Admin Password?", "admin123");
            if (pass === "admin123") {
                alert("Simulating density change for 'Gate A' to HIGH...");
                fetch('/admin/density', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ zoneId: 'gate_a', density: 98 })
                }).then(() => fetchData());
            }
        }

        // Auto Refresh
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
